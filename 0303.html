<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波▯市場 - 音樂欣賞遊戲</title>
    <style>
        :root {
            --primary-color: #f4a460;
            --accent-color: #e67e22;
            --highlight-color: #fff176;
            --bg-color: #fffaf0;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* 頂部固定區域 */
        .header-panel {
            position: sticky;
            top: 0;
            background: white;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .character-bank {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
            padding: 0 10px;
        }

        .character {
            padding: 10px 18px;
            background: var(--primary-color);
            color: white;
            border-radius: 25px;
            cursor: grab;
            font-weight: bold;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            transition: 0.2s;
            user-select: none;
        }
        .character:hover { background: var(--accent-color); }

        /* 遊戲區域 */
        .game-grid {
            width: 95%;
            max-width: 900px;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .segment-row {
            background: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s ease;
        }

        /* 當音樂播到此段落時的亮燈效果 */
        .segment-row.active {
            border-color: var(--accent-color);
            background-color: #fff9c4;
            transform: scale(1.03);
            box-shadow: 0 0 15px var(--highlight-color);
        }

        .drop-zone {
            width: 180px;
            height: 45px;
            border: 3px dashed #bbb;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: #fdfdfd;
            transition: 0.3s;
        }

        .drop-zone.filled { border-style: solid; background: white; border-color: var(--primary-color); }
        .drop-zone.correct { background: #c8e6c9 !important; border-color: #4caf50 !important; }
        .drop-zone.wrong { background: #ffcdd2 !important; border-color: #f44336 !important; }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        #player { border-radius: 10px; border: 2px solid #eee; }

        .instruction { font-size: 0.9rem; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header-panel">
        <h2 style="margin: 0 0 10px 0; color: #8b4513;">🐪 波斯市場音樂欣賞遊戲</h2>
        <div id="player"></div> <div class="character-bank">
            <div class="character" draggable="true">駱駝商隊</div>
            <div class="character" draggable="true">乞丐</div>
            <div class="character" draggable="true">公主</div>
            <div class="character" draggable="true">吹蛇人</div>
            <div class="character" draggable="true">酋長</div>
            <div class="character" draggable="true">雜耍魔術師</div>
        </div>
 <div class="instructions">
        <strong>📝 遊戲說明：</strong><br>
        1. 請聆聽音樂，並將上方的「角色」拖曳到下方的「音樂段落」空格中。<br>
        2. 角色可以重複使用。如果想更改答案，只需把新的答案再次拖進空格即可。<br>
        3. 排滿 11 個空格後，點擊「檢查答案」來驗證正確性（綠色代表正確，紅色代表錯誤）。
    </div>

        <p class="instruction">提示：音樂播到哪一段，該段落就會亮黃燈喔！</p>
    </div>

    <div class="game-grid" id="gameGrid">
        </div>

    <div class="controls">
        <button class="btn" style="background: #4caf50;" onclick="checkAnswers()">檢查答案</button>
        <button class="btn" style="background: #f44336;" onclick="clearWrongAnswers()">清除錯誤答案</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // 段落設定：包含秒數與標準答案
        const segmentsData = [
            { start: 0,   end: 37,  ans: "駱駝商隊" },
            { start: 38,  end: 73,  ans: "乞丐" },
            { start: 74,  end: 189, ans: "公主" },
            { start: 190, end: 206, ans: "雜耍魔術師" },
            { start: 207, end: 222, ans: "吹蛇人" },
            { start: 224, end: 246, ans: "酋長" },
            { start: 249, end: 268, ans: "乞丐" },
            { start: 269, end: 321, ans: "公主" },
            { start: 324, end: 348, ans: "駱駝商隊" },
            { start: 350, end: 390, ans: "公主" },
            { start: 391, end: 500, ans: "駱駝商隊" }
        ];

        let player;
        // 初始化 YouTube 播放器
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '180',
                width: '320',
                videoId: 'pNZ54SPOvxY', // 您提供的網址 ID
                playerVars: { 'rel': 0, 'showinfo': 0 }
            });
        }

        // 產生遊戲表格
        const grid = document.getElementById('gameGrid');
        segmentsData.forEach((seg, i) => {
            const row = document.createElement('div');
            row.className = 'segment-row';
            row.id = `row-${i}`;
            row.innerHTML = `
                <div>
                    <span style="font-weight: bold;">第 ${i+1} 段</span>
                    <span style="font-size: 0.8rem; color: #aaa; margin-left: 10px;">
                        (${formatTime(seg.start)} ~ ${formatTime(seg.end)})
                    </span>
                </div>
                <div class="drop-zone" data-index="${i}">請拖入答案</div>
            `;
            grid.appendChild(row);
        });

        // 監測音樂進度：控制亮燈邏輯
        setInterval(() => {
            if (player && player.getPlayerState() === YT.PlayerState.PLAYING) {
                const now = player.getCurrentTime();
                segmentsData.forEach((seg, i) => {
                    const row = document.getElementById(`row-${i}`);
                    if (now >= seg.start && now <= seg.end) {
                        row.classList.add('active');
                    } else {
                        row.classList.remove('active');
                    }
                });
            }
        }, 500);

        // 拖曳處理邏輯
        let draggedText = "";
        document.querySelectorAll('.character').forEach(char => {
            char.addEventListener('dragstart', (e) => {
                draggedText = char.innerText;
                e.dataTransfer.setData("text", draggedText);
            });
        });

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', (e) => e.preventDefault());
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                const data = e.dataTransfer.getData("text") || draggedText;
                zone.innerText = data;
                zone.className = 'drop-zone filled'; // 覆蓋舊答案
            });
        });

        // 檢查答案
        function checkAnswers() {
            document.querySelectorAll('.drop-zone').forEach((zone, i) => {
                if (zone.innerText === segmentsData[i].ans) {
                    zone.className = 'drop-zone filled correct';
                } else if (zone.innerText !== "請拖入答案") {
                    zone.className = 'drop-zone filled wrong';
                }
            });
        }

        // 全部清除錯誤答案
        function clearWrongAnswers() {
            document.querySelectorAll('.drop-zone').forEach((zone, i) => {
                if (zone.classList.contains('wrong')) {
                    zone.innerText = "請拖入答案";
                    zone.className = 'drop-zone';
                }
            });
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }
    </script>
</body>
</html>
